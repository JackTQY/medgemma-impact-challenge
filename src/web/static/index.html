<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clinical Council — Agentic Workflow</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem 1.5rem;
      line-height: 1.5;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: var(--text);
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }
    .flow {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
      color: var(--muted);
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font: inherit;
      margin-bottom: 0.75rem;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #loading {
      display: none;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    #loading.show { display: block; }
    #error {
      display: none;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid #f85149;
      color: #f85149;
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-top: 1rem;
    }
    #error.show { display: block; }
    #result {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    #result.show { display: block; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
    }
    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: var(--accent);
    }
    .section p, .section pre {
      margin: 0.35rem 0;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .section pre { font-family: inherit; color: var(--muted); }
    .entities ul {
      margin: 0.35rem 0;
      padding-left: 1.25rem;
      font-size: 0.9rem;
    }
    .pass { color: var(--success); }
    .fail { color: var(--warn); }
    .llm-log {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ----- Logo: Clinical Council (MedGemma + clinical council) ----- */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .logo-mark {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d9488 0%, #0891b2 50%, #6366f1 100%);
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.35);
    }
    .logo-mark svg {
      width: 26px;
      height: 26px;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .logo-title {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0;
      background: linear-gradient(90deg, #e6edf3 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-tagline {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0;
      font-weight: 500;
    }

    /* ----- Workflow diagram: larger, colorful, annotated ----- */
    .workflow-diagram {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      padding: 1rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .workflow-node {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0.85rem 0.5rem;
      border-radius: 10px;
      min-width: 0;
    }
    .workflow-node.scribe {
      background: linear-gradient(180deg, rgba(13, 148, 136, 0.2) 0%, rgba(13, 148, 136, 0.06) 100%);
      border: 1px solid rgba(13, 148, 136, 0.45);
      color: #5eead4;
    }
    .workflow-node.auditor {
      background: linear-gradient(180deg, rgba(217, 119, 6, 0.2) 0%, rgba(217, 119, 6, 0.06) 100%);
      border: 1px solid rgba(217, 119, 6, 0.45);
      color: #fcd34d;
    }
    .workflow-node.verifier {
      background: linear-gradient(180deg, rgba(5, 150, 105, 0.2) 0%, rgba(5, 150, 105, 0.06) 100%);
      border: 1px solid rgba(5, 150, 105, 0.45);
      color: #6ee7b7;
    }
    .workflow-node-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }
    .workflow-node-desc {
      font-size: 0.75rem;
      opacity: 0.92;
      line-height: 1.3;
      max-width: 140px;
    }
    .workflow-arrow {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 0.25rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <header class="logo">
    <div class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Gem (MedGemma) + facet lines for clinical precision -->
        <path d="M12 2l3 7-3 6-3-6 3-7z" fill="rgba(255,255,255,0.98)" />
        <path d="M12 15 6 22h12L12 15z" fill="rgba(255,255,255,0.8)" />
        <path d="M9 9 6 15l6 6 6-6-3-6z" fill="rgba(255,255,255,0.55)" />
      </svg>
    </div>
    <div class="logo-text">
      <h1 class="logo-title">Clinical Council</h1>
      <p class="logo-tagline">MedGemma-powered agentic workflow</p>
    </div>
  </header>

  <div class="workflow-diagram" role="img" aria-label="Workflow: Scribe extracts entities, Auditor checks risks, Verifier cross-checks">
    <div class="workflow-node scribe">
      <span class="workflow-node-name">Scribe</span>
      <span class="workflow-node-desc">LLM extraction → structured entities</span>
    </div>
    <div class="workflow-arrow" aria-hidden="true">→</div>
    <div class="workflow-node auditor">
      <span class="workflow-node-name">Auditor</span>
      <span class="workflow-node-desc">Risk & guideline checks</span>
    </div>
    <div class="workflow-arrow" aria-hidden="true">→</div>
    <div class="workflow-node verifier">
      <span class="workflow-node-name">Verifier</span>
      <span class="workflow-node-desc">Cross-check & verify</span>
    </div>
  </div>

  <form id="form">
    <label for="raw_ehr">Raw EHR / clinical note</label>
    <textarea id="raw_ehr" name="raw_ehr" required placeholder="e.g. 65yo M, HTN. On lisinopril 10mg. Last HbA1c 7.2%. No known allergies.">65yo M, HTN. On lisinopril 10mg. Last HbA1c 7.2%. No known allergies.</textarea>
    <label for="patient_id">Patient ID (optional)</label>
    <input type="text" id="patient_id" name="patient_id" value="web-001" placeholder="web-001" />
    <button type="submit" id="btn">Run workflow</button>
  </form>
  <p id="loading">Running workflow… (Scribe may call MedGemma; this can take a minute.)</p>
  <div id="error"></div>
  <div id="result"></div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const loading = document.getElementById('loading');
    const errEl = document.getElementById('error');
    const resultEl = document.getElementById('result');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.classList.add('show');
      resultEl.classList.remove('show');
    }
    function clearError() {
      errEl.textContent = '';
      errEl.classList.remove('show');
    }

    function formatEntities(entities) {
      if (!entities) return '';
      const keys = ['diagnoses', 'medications', 'allergies', 'lab_results', 'procedures', 'vitals'];
      const parts = [];
      for (const k of keys) {
        const v = entities[k];
        if (v && Array.isArray(v) && v.length) parts.push(k + ': ' + JSON.stringify(v));
      }
      return parts.length ? parts.join('\n') : '(none extracted)';
    }

    function render(data) {
      const e = data.extracted_entities || {};
      const risks = data.clinical_risks || [];
      const risksHtml = risks.length
        ? risks.map(r => '<li>' + (r.description || r) + '</li>').join('')
        : '<li>(none)</li>';
      const passed = data.verification_passed === true;
      const llmLog = data.__llm_call_log || [];
      const llmHtml = llmLog.length
        ? '<p class="llm-log">Total LLM calls: ' + llmLog.length + '</p>' +
          llmLog.map(c => '<p class="llm-log">#' + (c.call || '') + ' ' + (c.node || '') + '.' + (c.method || 'invoke') + ' — ' + (c.purpose || '') +
            (c.n_prompt_tokens != null && c.n_output_tokens != null ? ' (' + c.n_prompt_tokens + ' → ' + c.n_output_tokens + ' tokens)' : '') + '</p>').join('')
        : '';

      resultEl.innerHTML =
        '<div class="section"><h2>1. Scribe (extraction)</h2><p>' + escapeHtml((data.scribe_summary || '').slice(0, 500)) + (data.scribe_summary && data.scribe_summary.length > 500 ? '…' : '') + '</p><pre class="entities">' + escapeHtml(formatEntities(e)) + '</pre></div>' +
        '<div class="section"><h2>2. Auditor (risks)</h2><p>' + escapeHtml((data.auditor_notes || '').slice(0, 400)) + '</p><ul>' + risksHtml + '</ul></div>' +
        '<div class="section"><h2>3. Verifier</h2><p>' + (passed ? '<span class="pass">Passed</span>' : '<span class="fail">Not passed</span>') + '</p><p>' + escapeHtml((data.final_notes || '').slice(0, 400)) + '</p></div>' +
        (llmHtml ? '<div class="section"><h2>LangChain LLM usage</h2>' + llmHtml + '</div>' : '');
      resultEl.classList.add('show');
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      btn.disabled = true;
      loading.classList.add('show');
      resultEl.classList.remove('show');
      try {
        const res = await fetch('/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            raw_ehr: document.getElementById('raw_ehr').value.trim(),
            patient_id: document.getElementById('patient_id').value.trim() || 'web-001'
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.message || 'Request failed');
        render(data);
      } catch (err) {
        showError(err.message || 'Something went wrong.');
      } finally {
        btn.disabled = false;
        loading.classList.remove('show');
      }
    });
  </script>
</body>
</html>
